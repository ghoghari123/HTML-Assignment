<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Management System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
        }

        th,
        td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background-color: lightgray;
        }
    </style>

</head>

<body>

    <h1>College Management System</h1>

    <table>

        <tr>
            <th rowspan="2">Department</th>
            <th colspan="2">Courses</th>
            <th rowspan="2">Teacher</th>
            <th rowspan="2">Students</th>
        </tr>

        <tr>
            <th>Course Name</th>
            <th>Course Code</th>
        </tr>

        <tr>
            <td rowspan="2">Computer Science</td>
            <td>BCA</td>
            <td>CS101</td>
            <td>Mr. Sharma</td>
            <td>60</td>
        </tr>

        <tr>
            <td>MCA</td>
            <td>CS201</td>
            <td>Ms. Patel</td>
            <td>40</td>
        </tr>

        <tr>
            <td rowspan="2">Commerce</td>
            <td>B.Com</td>
            <td>CM101</td>
            <td>Mr. Mehta</td>
            <td>55</td>
        </tr>

        <tr>
            <td>M.Com</td>
            <td>CM201</td>
            <td>Ms. Shah</td>
            <td>35</td>
        </tr>

    </table>

</body>

</html>
